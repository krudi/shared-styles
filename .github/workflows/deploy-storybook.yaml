name: Deploy (Storybook)

on:
  release:
    types: [published]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, '@krudi/styles@') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:

      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm install

      - name: Build Storybook workspace
        run: npm run build -- --filter=@krudi/storybook...

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Storybook artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/storybook/storybook-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
