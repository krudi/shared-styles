name: Storybook Tests

on:
  push:
    branches:
      - main

  pull_request:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: test-storybook-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-storybook:
    if: ${{ github.actor != 'dependabot[bot]' }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-commands:
          - "npm run test:storybook"

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm install

      - name: Build Storybook workspace
        run: npm run build -- --filter=@krudi/storybook...

      - name: Install Playwright browsers (CLI)
        run: npx playwright install chromium --with-deps

      - name: Run Storybook tests
        run: ${{ matrix.test-commands }}
